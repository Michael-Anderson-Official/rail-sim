<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>京王線 3D — 桜上水〜上北沢</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#e4007f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="京王線3D">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #bcd4e6; }
  #app { position: fixed; inset: 0; }
  .hud {
    position: fixed; left: 0; right: 0; pointer-events: none;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif; color: #14203a;
  }
  #title { top: 10px; text-align: center; }
  #title .t { font-size: 15px; font-weight: 700; }
  #title .s { font-size: 11px; opacity: .7; }
  #caption {
    bottom: 16px; text-align: center; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,.82); display: inline-block; left: 50%; transform: translateX(-50%);
    position: fixed; padding: 7px 16px; border-radius: 20px; color: #14203a;
  }
  #hint { bottom: 54px; text-align: center; font-size: 10px; opacity: .55; }
  #viewBtn {
    position: fixed; top: 14px; right: 12px; z-index: 10;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif; font-size: 13px; font-weight: 700;
    padding: 9px 14px; border: none; border-radius: 22px;
    background: rgba(255,255,255,.92); color: #14203a;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  #viewBtn:active { transform: scale(.96); }
</style>
</head>
<body>
<div id="app"></div>
<div id="title" class="hud"><div class="t">京王線 3D ｜ 桜上水〜上北沢</div><div class="s">実データの線路・2面4線・待避のデモ</div></div>
<div id="hint" class="hud">指でドラッグ＝回転　／　2本指＝ズーム・移動　<span id="verTag" style="opacity:.6"></span></div>
<div id="caption"></div>
<button id="viewBtn" type="button">🚃 前面展望</button>
<div id="boot" style="position:fixed; top:48%; left:0; right:0; text-align:center; font-size:13px; color:#4a5a6a; font-family:sans-serif; pointer-events:none;">起動中…</div>
<pre id="err" style="display:none; position:fixed; left:8px; right:8px; bottom:70px; margin:0; padding:10px; background:rgba(190,0,0,.92); color:#fff; font-size:11px; line-height:1.4; white-space:pre-wrap; z-index:99; border-radius:10px; max-height:44%; overflow:auto;"></pre>
<script>
  window.__boot = function (msg) { var e = document.getElementById('err'); if (e) { e.style.display = 'block'; e.textContent += msg + '\n'; } };
  window.addEventListener('error', function (ev) {
    window.__boot('ERR: ' + (ev.message || '') + '  @' + String(ev.filename || '').split('/').pop() + ':' + (ev.lineno || ''));
  });
  window.addEventListener('unhandledrejection', function (ev) { window.__boot('REJECT: ' + (ev.reason && (ev.reason.message || ev.reason))); });
  if (!window.WebGLRenderingContext) window.__boot('この端末/ブラウザはWebGL非対応の可能性');
</script>
<!-- 版はAPP_Vの1箇所で管理。デプロイ時はAPP_Vとversion.jsonを同じ数字に上げる -->
<script>
var APP_V = 10;
document.getElementById('verTag').textContent = '(v' + APP_V + ')';
['three.min.js','OrbitControls.js','DRACOLoader.js','GLTFLoader.js','plateau_manifest.js','segment.js','buildings.js','game.js'].forEach(function (s) {
  document.write('<scr' + 'ipt src="' + s + '?v=' + APP_V + '"><\/scr' + 'ipt>');
});
</script>
<script>
// 自動アップデート: version.jsonをキャッシュ無視で確認し、新版が出ていたら入口ごと読み直す
// （GitHub Pagesはindex.htmlを10分キャッシュするため、ホーム画面起動だと古い版が残り続ける対策）
(function () {
  function check() {
    fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (!(j && j.v > APP_V)) return;
        var last = +(sessionStorage.getItem('railsim:upd') || 0);
        if (Date.now() - last < 120000) return;    // デプロイ中の空振りリロード連発を防ぐ
        sessionStorage.setItem('railsim:upd', String(Date.now()));
        var el = document.getElementById('caption');
        if (el) el.textContent = '新しい版が出ました。更新します…';
        setTimeout(function () { location.replace('./?_=' + Date.now()); }, 800);
      }).catch(function () {});
  }
  setTimeout(check, 3000);
  setInterval(check, 60000);
  document.addEventListener('visibilitychange', function () { if (!document.hidden) check(); });
})();
</script>
</body>
</html>
